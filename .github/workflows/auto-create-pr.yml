name: Auto Create PR to Dev

on:
  push:
    branches:
      - 'dev*' 
    branches-ignore:
      - 'dev'

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Pull Request to Dev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          
          PR_EXISTS=$(gh pr list --head "$BRANCH_NAME" --base dev --json number --jq '.[0].number')
          
          if [ -z "$PR_EXISTS" ]; then
            gh pr create \
              --base dev \
              --head "$BRANCH_NAME" \
              --title "Create Pull Request from $BRANCH_NAME to Dev" \
              --body "Hệ thống tự động tạo PR cho nhánh $BRANCH_NAME. Vui lòng kiểm tra Smoke Test trước khi duyệt."
          else
            echo "PR cho nhánh $BRANCH_NAME đã tồn tại."
          fi